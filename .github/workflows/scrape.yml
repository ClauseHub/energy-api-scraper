name: Scrape and ingest tariff data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Scrape and submit via API
        run: uv run scrape
        env:
          CLAUSEHUB_API_URL: https://clausehub-energy-api.fly.dev
          CLAUSEHUB_JWT: ${{ secrets.CLAUSEHUB_ADMIN_JWT }}
